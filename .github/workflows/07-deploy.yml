name: "07 - Деплой в PROD"

on:
  workflow_run:
    workflows: ["06 - Уведомление в Telegram"]
    types: [completed]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  issues: write
  deployments: write

jobs:
  deploy:
    name: "🚀 Деплой в production"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: "📋 Начало деплоя"
        run: |
          echo "═══════════════════════════════════════════"
          echo "🚀 ШАГ 7: ДЕПЛОЙ В PRODUCTION"
          echo "═══════════════════════════════════════════"
          echo "🆔 Run ID: ${{ github.event.workflow_run.id }}"
          echo "📊 Статус предыдущего шага: ✅ Успешно"

      - uses: actions/checkout@v4

      - name: "📦 Получение версии"
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.1.0")
          echo "📦 Версия для деплоя: v$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: "🔧 Настройка окружения"
        run: |
          echo "🌐 Окружение: production"
          echo "📅 Время деплоя: $(date)"
          
          # Создаем deployment в GitHub
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments \
            -d '{
              "ref": "main",
              "environment": "production",
              "description": "Deploy v${{ env.VERSION }}",
              "auto_merge": false,
              "required_contexts": []
            }'

      - name: "🚀 Симуляция деплоя"
        run: |
          echo "═══════════════════════════════════════════"
          echo "🚀 ЗАПУСК ДЕПЛОЯ"
          echo "═══════════════════════════════════════════"
          
          # Прогресс-бар
          echo "📦 Загрузка образа: v${{ env.VERSION }}"
          for i in {1..5}; do
            echo -n "🟩"
            sleep 1
          done
          echo " ✅"
          
          echo "🔄 Остановка старых контейнеров..."
          sleep 2
          
          echo "🐳 Запуск новых контейнеров..."
          sleep 2
          
          echo "✅ Проверка здоровья..."
          sleep 2
          
          echo ""
          echo "✅ ДЕПЛОЙ УСПЕШНО ЗАВЕРШЕН"
          echo "────────────────────────────────"
          echo "📦 Версия: v${{ env.VERSION }}"
          echo "🌐 URL: https://${{ github.repository_owner }}.example.com"
          echo "⏱️ Время: $(date)"

  add-prod-label:
    name: "🏷️ Добавление метки PROD"
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: "➕ Добавление метки"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelName = 'PROD';
            
            try {
              // Создаем метку если нет
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              }).catch(async () => {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'e99695',
                  description: '🚀 Развернуто в production'
                });
              });
              
              // Ищем последний закрытый PR
              const { data: pulls } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed',
                sort: 'updated',
                direction: 'desc',
                per_page: 1
              });
              
              if (pulls.length > 0) {
                await github.rest.issues.addLabels({
                  issue_number: pulls[0].number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: [labelName]
                });
                console.log(`✅ Метка ${labelName} добавлена к PR #${pulls[0].number}`);
              }
              
            } catch (error) {
              console.log(`⚠️ Ошибка: ${error.message}`);
            }

      - name: "📊 Итог"
        run: |
          echo "═══════════════════════════════════════════"
          echo "✅ ШАГ 7 ЗАВЕРШЕН"
          echo "═══════════════════════════════════════════"
          echo "📦 Версия: v${{ env.VERSION }}"
          echo "🏷️ Метка PROD: ✅ Добавлена"