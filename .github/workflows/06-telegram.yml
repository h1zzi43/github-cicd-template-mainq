name: "06 - Уведомление в Telegram"

on:
  workflow_run:
    workflows: ["05 - Публикация в Docker Hub"]
    types: [completed]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

jobs:
  telegram-notify:
    name: "📱 Send to Telegram"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "📋 Получение информации о запуске"
        run: |
          echo "═══════════════════════════════════════════"
          echo "📱 ОТПРАВКА УВЕДОМЛЕНИЯ В TELEGRAM"
          echo "═══════════════════════════════════════════"
          
          echo "🆔 Run ID: ${{ github.event.workflow_run.id }}"
          echo "📊 Статус: ${{ github.event.workflow_run.conclusion }}"
          echo "🌿 Ветка: ${{ github.event.workflow_run.head_branch }}"

      - name: "🔍 Получение версии"
        id: get_version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
            echo "✅ Версия из VERSION файла: v$VERSION"
          else
            VERSION="0.1.0"
            echo "⚠️ VERSION файл не найден, используем v$VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: "📥 Загрузка changelog артефакта"
        id: download
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: 04-changelog.yml
          name: changelog-v${{ steps.get_version.outputs.version }}
          path: ./artifacts
          run_id: ${{ github.event.workflow_run.id }}
          if_no_artifact_found: warn

      - name: "📝 Подготовка сообщения"
        id: prepare
        run: |
          echo "═══════════════════════════════════════════"
          echo "📝 ПОДГОТОВКА СООБЩЕНИЯ"
          echo "═══════════════════════════════════════════"
          
          VERSION="${{ steps.get_version.outputs.version }}"
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
            ### gegre
          # Формируем сообщение
          cat > message.md << EOF
          🎉 **Новый релиз v${VERSION}!**
          
          📦 **Проект:** ${REPO}
          🔗 **Ссылка на сборку:** https://github.com/${REPO}/actions/runs/${RUN_ID}
          
          📊 **Статус:** ✅ Успешно
          📅 **Дата:** $(date +"%d.%m.%Y %H:%M")
          EOF
          
          # Добавляем changelog если есть
          if [ -f artifacts/changelog.md ]; then
            echo "" >> message.md
            echo "📝 **Изменения:**" >> message.md
            echo "" >> message.md
            cat artifacts/changelog.md >> message.md
            echo "✅ Changelog найден и добавлен"
          else
            echo "⚠️ Changelog не найден, отправляю только基本信息"
          fi
          
          echo "message<<EOF" >> $GITHUB_OUTPUT
          cat message.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "📤 Проверка наличия Telegram секретов"
        id: check_secrets
        run: |
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ] && [ -n "${{ secrets.TELEGRAM_TOKEN }}" ]; then
            echo "✅ Telegram секреты настроены"
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Telegram секреты НЕ настроены"
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo ""
            echo "📝 ИНСТРУКЦИЯ ПО НАСТРОЙКЕ TELEGRAM:"
            echo "────────────────────────────────────"
            echo "1. Найдите бота @BotFather в Telegram"
            echo "2. Отправьте команду: /newbot"
            echo "3. Назовите бота: GitHubCICDBot"
            echo "4. Получите TOKEN и скопируйте его"
            echo "5. Найдите свой CHAT_ID:"
            echo "   - Напишите боту @userinfobot"
            echo "   - Отправьте /start"
            echo "   - Получите ваш ID"
            echo "6. Добавьте секреты в GitHub:"
            echo "   - TELEGRAM_TOKEN"
            echo "   - TELEGRAM_CHAT_ID"
          fi
          # Добавляем changelog
      - name: "📱 Отправка в Telegram"
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ steps.prepare.outputs.message }}
          format: markdown
          disable_web_page_preview: true

      - name: "📊 Результат отправки"
        run: |
          echo "═══════════════════════════════════════════"
          echo "📱 РЕЗУЛЬТАТ ОТПРАВКИ"
          echo "═══════════════════════════════════════════"
          
          if [ "${{ steps.check_secrets.outputs.has_secrets }}" == "true" ]; then
            echo "✅ Уведомление отправлено в Telegram"
            echo "📦 Версия: v${{ steps.get_version.outputs.version }}"
          else
            echo "⚠️ Уведомление не отправлено (секреты не настроены)"
            echo "📝 Для отправки уведомлений настройте Telegram бота"
          fi