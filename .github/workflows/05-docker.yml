name: "05 - Публикация в Docker Hub"

on:
  pull_request:
    branches: [main, master]
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  docker-build-push:
    name: "🐳 Build and Push Docker Image"
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      image_name: ${{ env.IMAGE_NAME }}
      push_status: ${{ steps.push_check.outputs.status }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "📋 Получение версии"
        id: get_version
        run: |
          echo "═══════════════════════════════════════════"
          echo "🐳 ПУБЛИКАЦИЯ В DOCKER HUB"
          echo "═══════════════════════════════════════════"
          
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
            echo "✅ Версия из VERSION файла: v$VERSION"
          else
            VERSION="0.1.0"
            echo "⚠️ VERSION файл не найден, используем v$VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: "🔧 Определение имени образа"
        run: |
          REPO_NAME=$(basename ${{ github.repository }})
          IMAGE_NAME="${{ github.repository_owner }}/${REPO_NAME}"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "📦 Имя образа: $IMAGE_NAME"
          
          # Проверяем наличие секретов
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "✅ Docker Hub секреты настроены"
            echo "DOCKER_SECRETS_OK=true" >> $GITHUB_ENV
          else
            echo "⚠️ Docker Hub секреты НЕ настроены"
            echo "DOCKER_SECRETS_OK=false" >> $GITHUB_ENV
            echo "❌ Не удастся выполнить push в Docker Hub"
          fi

      - name: "🔑 Login to Docker Hub (с проверкой)"
        id: login
        if: env.DOCKER_SECRETS_OK == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: "✅ Проверка авторизации в Docker Hub"
        if: env.DOCKER_SECRETS_OK == 'true'
        run: |
          echo "═══════════════════════════════════════════"
          echo "🔑 ПРОВЕРКА АВТОРИЗАЦИИ В DOCKER HUB"
          echo "═══════════════════════════════════════════"
          
          if [ "${{ steps.login.outcome }}" == "success" ]; then
            echo "✅ Успешный вход в Docker Hub как ${{ secrets.DOCKERHUB_USERNAME }}"
            echo "PUSH_ALLOWED=true" >> $GITHUB_ENV
            
            # Проверяем существование репозитория
            echo "🔍 Проверка репозитория ${{ env.IMAGE_NAME }}..."
            if docker manifest inspect ${{ env.IMAGE_NAME }}:latest > /dev/null 2>&1; then
              echo "✅ Репозиторий существует"
            else
              echo "⚠️ Репозиторий не существует или нет доступа"
              echo "📝 Создайте репозиторий в Docker Hub: https://hub.docker.com/repository/create"
            fi
          else
            echo "❌ Ошибка входа в Docker Hub"
            echo "📝 Проверьте настройки секретов:"
            echo "   DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME != '' && '✓ установлен' || '✗ не установлен' }}"
            echo "   DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN != '' && '✓ установлен' || '✗ не установлен' }}"
            echo "PUSH_ALLOWED=false" >> $GITHUB_ENV
          fi

      - name: "🏗️ Build Docker image (всегда)"
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # Не пушим, только собираем
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.get_version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          load: true  # Загружаем в локальный демон

      - name: "📦 Проверка собранного образа"
        run: |
          echo "═══════════════════════════════════════════"
          echo "📦 ПРОВЕРКА СОБРАННОГО ОБРАЗА"
          echo "═══════════════════════════════════════════"
          
          docker images ${{ env.IMAGE_NAME }}
          
          echo ""
          echo "📋 Информация об образе:"
          docker inspect ${{ env.IMAGE_NAME }}:v${{ steps.get_version.outputs.version }} | jq '.[0].Config.Labels' 2>/dev/null || echo "  Нет дополнительной информации"
          
          echo ""
          echo "✅ Образ успешно собран локально"

      - name: "🚀 Push to Docker Hub (если есть права)"
        id: push
        if: env.PUSH_ALLOWED == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.get_version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: "📊 Результат публикации"
        id: push_check
        run: |
          if [ "${{ env.PUSH_ALLOWED }}" == "true" ] && [ "${{ steps.push.outcome }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "═══════════════════════════════════════════"
            echo "✅ ОБРАЗ УСПЕШНО ОПУБЛИКОВАН В DOCKER HUB"
            echo "═══════════════════════════════════════════"
            echo "📦 Репозиторий: ${{ env.IMAGE_NAME }}"
            echo "🏷️ Теги:"
            echo "  • v${{ steps.get_version.outputs.version }}"
            echo "  • latest"
            echo ""
            echo "🔗 Ссылка: https://hub.docker.com/r/${{ env.IMAGE_NAME }}"
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "═══════════════════════════════════════════"
            echo "⚠️ ПУБЛИКАЦИЯ ПРОПУЩЕНА"
            echo "═══════════════════════════════════════════"
            echo "📋 Причины:"
            if [ "${{ env.DOCKER_SECRETS_OK }}" != "true" ]; then
              echo "  • Docker Hub секреты не настроены"
            fi
            if [ "${{ env.PUSH_ALLOWED }}" != "true" ]; then
              echo "  • Нет прав на push (ошибка авторизации)"
            fi
            echo ""
            echo "📝 Для публикации настройте секреты:"
            echo "   1. DOCKERHUB_USERNAME - ваш логин в Docker Hub"
            echo "   2. DOCKERHUB_TOKEN - токен доступа (не пароль!)"
            echo ""
            echo "🔗 Как создать токен: https://docs.docker.com/security/for-developers/access-tokens/"
          fi
          echo "═══════════════════════════════════════════"

  add-docker-label:
    name: "🏷️ Добавление label dockerhub"
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "📝 Информация о статусе"
        run: |
          echo "═══════════════════════════════════════════"
          echo "🏷️ ДОБАВЛЕНИЕ МЕТКИ DOCKERHUB"
          echo "═══════════════════════════════════════════"
          echo "📦 Версия: v${{ needs.docker-build-push.outputs.version }}"
          echo "🚀 Статус публикации: ${{ needs.docker-build-push.outputs.push_status }}"
          
      - name: "➕ Добавление метки"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelName = 'dockerhub';
            const pushStatus = '${{ needs.docker-build-push.outputs.push_status }}';
            const version = '${{ needs.docker-build-push.outputs.version }}';
            const imageName = '${{ needs.docker-build-push.outputs.image_name }}';
            
            console.log(`📊 Статус push: ${pushStatus}`);
            
            try {
              // Проверяем/создаём метку
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              }).catch(async () => {
                console.log('🆕 Создание метки dockerhub...');
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: '0e8a16',
                  description: '🐳 Опубликовано в Docker Hub'
                });
              });
              
              // Добавляем метку к PR
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [labelName]
              });
              
              console.log(`✅ Метка ${labelName} добавлена!`);
              
              if (pushStatus === 'success') {
                console.log(`\n📦 Образ успешно опубликован:`);
                console.log(`  • ${imageName}:v${version}`);
                console.log(`  • ${imageName}:latest`);
              } else {
                console.log(`\n⚠️ Метка добавлена, но образ не был опубликован в Docker Hub.`);
              }
              
            } catch (error) {
              console.log(`⚠️ Ошибка при добавлении метки: ${error.message}`);
            }